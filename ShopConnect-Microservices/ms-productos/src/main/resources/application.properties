server.port=8081
spring.application.name=ms-productos

# Conexión a Oracle (Usamos el nombre del servicio que está en tu docker-compose)
spring.datasource.url=jdbc:oracle:thin:@oracle-db:1521:XE
spring.datasource.username=system
spring.datasource.password=admin
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuración de Hibernate (Forzamos el dialecto para evitar errores)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- ESTABILIDAD DOCKER ---
# Si Oracle no ha despertado, el microservicio NO se apaga, sigue intentando
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000