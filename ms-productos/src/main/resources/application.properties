spring.application.name=ms-nombre-del-servicio
# Puerto según la tabla de arriba
server.port=8081

# Conexión a Oracle
spring.datasource.url=jdbc:oracle:thin:@oracle-db:1521:XE
spring.datasource.username=system
spring.datasource.password=admin
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuración Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Resiliencia: Esto evita que el microservicio se apague si Oracle tarda en encender
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000
